DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 Phúc Baccarat VIP</title>

<style>
body{
  background:#0b1a2a;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
h2{
  background:linear-gradient(to right,#0d2b4d,#1f4f7a);
  padding:15px;
  margin:0;
}

/* BUTTON */
.btn{
  padding:15px;
  margin:8px;
  font-size:18px;
  border:none;
  border-radius:12px;
  width:90px;
  color:#fff;
}
.b{background:#1976D2}
.p{background:#D32F2F}
.t{background:#388E3C}

/* BAR */
.bar{
  width:80%;
  height:20px;
  margin:15px auto;
  background:#333;
  border-radius:20px;
}
.fill{
  height:100%;
  background:linear-gradient(to right,red,blue);
  width:50%;
  border-radius:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(12, 22px);
  gap:5px;
  justify-content:center;
  margin-top:15px;
}
.cell{
  width:22px;
  height:22px;
  border-radius:50%;
}

/* BOX */
.box{
  background:#10263f;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

/* ALERT */
.warn{
  background:#ff9800;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  color:#000;
}

.good{
  background:#4CAF50;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

button.reset{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
}
</style>
</head>
